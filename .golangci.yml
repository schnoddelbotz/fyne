version: "2"

linters:
  enable:
    - errcheck
    - gocyclo
    - gosec
    - govet
    - nolintlint
    - staticcheck
    - unused
  exclusions:
    presets:
      - std-error-handling
    rules:
      - path: cmd/fyne/ # The whole tool is deprecated
        linters:
          - staticcheck
          - errcheck
      - path: cmd/fyne_demo/ # The whole tool is deprecated
        linters:
          - errcheck
      - path: test/ # In tests, the usage of deprecated stuff is valid to check for compatibility.
        linters:
          - staticcheck
        text: "SA1019"
      - path: _test\.go # TODO: Clarify whether we should explicitly handle errors in tests (e.g., using require.NoError()).
        linters:
          - errcheck
  settings:
    gosec:
      excludes:
        - G101 # temporarily
        - G103 # temporarily
        - G104 # gosec does not have a sophisticated ignore for unchecked errors; we rely on errcheck, instead
        - G107 # temporarily
        - G110 # temporarily
        - G114 # temporarily
        - G115 # temporarily
        - G204 # temporarily
        - G301 # temporarily
        - G302 # temporarily
        - G304 # temporarily
        - G306 # temporarily
        - G401 # temporarily
        - G505 # temporarily
        - G601 # temporarily
        - G703 # temporarily
    staticcheck:
      checks:
        - all
        - -ST1000
